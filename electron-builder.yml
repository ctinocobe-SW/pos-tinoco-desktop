appId: com.tinoco.pos.desktop
productName: "El Mercader POS"
copyright: "© 2025 Tinoco"

directories:
  output: "dist"
  buildResources: "build-resources"

files:
  - "electron-dist/**/*"
  - "!electron-dist/**/*.map"
  - "assets/**/*"
  - "node_modules/**/*"
  - "!node_modules/**/{test,tests,__tests__,spec}/**"
  - "!node_modules/**/*.{md,map}"
  - "package.json"
  - ".env"

# El proyecto Next.js se incluye como recurso extra
extraResources:
  - from: "../pos-tinoco"
    to: "web"
    filter:
      - ".next/**/*"
      - "public/**/*"
      - "node_modules/**/*"
      - "package.json"
      - "next.config.js"
      - "!node_modules/**/{test,tests,__tests__}/**"
      - "!node_modules/**/*.{md,map}"

# ── Windows ──────────────────────────────────────────────────────
win:
  target:
    - target: nsis
      arch: [x64]
  icon: "build-resources/icon.png"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "El Mercader POS"
  runAfterFinish: true
  installerHeaderIcon: "build-resources/icon.png"

# ── macOS ─────────────────────────────────────────────────────────
mac:
  target: dmg
  icon: "build-resources/icon.png"
  category: "public.app-category.business"

# node.exe standalone para correr Next.js en Windows
extraFiles:
  - from: "build-resources/node.exe"
    to: "node.exe"
    filter: ["**/*"]

# ── Compresión ────────────────────────────────────────────────────
compression: maximum
asar: true
asarUnpack:
  - "node_modules/better-sqlite3/**"

# Auto-update via GitHub Releases
publish:
  provider: github
  owner: ctinocobe-SW
  repo: pos-tinoco-desktop
